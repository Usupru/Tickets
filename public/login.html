<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Tickets Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/TicketsIcon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell auth-page">
      <header class="topbar">
        <div class="topbar-left">
          <a class="button button-ghost page-home-link" href="/">Home</a>
          <div class="brand">
            <div class="brand-mark">TE</div>
            <div>
              <p class="eyebrow">Access</p>
              <h1>Sign in</h1>
            </div>
          </div>
        </div>
        <a class="button button-ghost" href="/register">Sign up</a>
      </header>

      <main class="auth-layout">
        <section class="auth-intro">
          <p class="eyebrow">Welcome back</p>
          <h2>Access your dashboard to manage sales and entry control.</h2>
          <p class="lead">
            Use your email or username and password to sign in.
          </p>
        </section>

        <form class="auth-card auth-card--large auth-form" action="/login" method="post">
          <h3>Log in</h3>
          <label>
            Email or Username
            <input
              type="text"
              name="email"
              placeholder="you@example.com"
              required
            />
          </label>
          <label>
            Password
            <input
              type="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </label>
          <div class="auth-form__actions">
            <button class="button button-primary" type="submit">Sign in</button>
          </div>
        </form>
      </main>
    </div>
  </body>
</html>
