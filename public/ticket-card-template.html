<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket card template | Tickets Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/TicketsIcon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="ticket-card">
        <div class="ticket-card__header">
          <div>
            <p class="ticket-card__eyebrow">Ticket 1</p>
            <h3>Event title</h3>
          </div>
          <span class="ticket-card__badge">Reserved</span>
        </div>
        <div class="ticket-card__qr">
          <img src="/qr-placeholder.svg" alt="" />
        </div>
        <dl class="ticket-card__meta">
          <div>
            <dt>Order</dt>
            <dd>#0000</dd>
          </div>
        </dl>
      </section>
    </main>
  </body>
</html>
